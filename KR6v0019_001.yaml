body:
  text: 前殘摩耶夫人將諸天衆莊嚴受諸快樂爾時佛作六種不祥之夢一者夢見須彌山崩四大海水枯竭二者夢見獅子來咬我身兩乳自然流出三者夢見猛火來燒我身四者夢見寶幢摧折幡華崩倒五者夢見磨竭大魚吞啖衆生又見夜叉羅剎吸人精氣六者夢見衆生如蜂失王周章漫走作此夢已憂愁不樂爾時佛母說夢未了即見告人優波離從空而來爾時佛母口問聖人從何方而來太劇形容憔悴面色無光狀似怯人復無威德爾時優波離哽咽告言佛母佛母我從南閻浮提來如來大師昨夜子時捨大法身入般涅槃去也故使我來告諸眷屬願母早來禮敬三寶爾時佛母聞是語已心生哀切痛哉苦哉渾捶自撲狀如五須彌山崩遍體血現如波羅奢華悶絶躃地有一天女名曰芬葩以將冷水灑面良久乃蘇爾時摩耶夫人與諸天衆恭敬圍繞從忉利天上頓身而下靉靆雲飛直至娑羅林間正見如來在金棺銀槨殯殮已迄香木萬束擬欲焚身白氈千端以將纏繞十大弟子悲號震天四果聖人摧身叩地乃至聲聞緣覺之類金剛獅子之流咸以五體崩傷六情酸楚身毛皆豎唯見鉢盂錫杖掛於林間僧伽離衣疊在棺側爾時摩耶夫人手持此物而作是言此是我子生存之日恆持此物化導衆生今既入般涅槃此物今無主也爾時佛母將頭叩棺便即散髮捶胸繞棺三匝却住一面捫淚而言喚言悉達悉達汝是我子我是汝母昔在王宮始生七日我便命終姨母波闍乳養始年七歲逾城出家三十成道覆護衆生今既入般涅槃云何不留半偈之法悉達悉達爾時如來聞母喚聲以神通力金棺銀槨豁然自開妙兜羅錦颯然而下踴在空中高七多羅樹間現紫磨黃金色身却坐千葉蓮華般若之台手把優鉢羅華為母說法世間苦空一切恩愛會有離別一切江河會有枯竭一切叢林會有摧折母子之情會有離別說是語已便已沒矣爾時佛母聞是妙法心開意解不轉女身證得阿羅漢果爾時摩耶夫人將諸天衆前後圍繞還歸本天未至天所住立虛空心生慈悲嗚呼大哭天地震動淚下如雨雲中百鳥皆作哭聲痛哉苦哉何期如來入般涅槃永不相見去也大師録文完
